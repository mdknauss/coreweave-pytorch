version: '3.9'

services:
  pytorch:
    image: nvcr.io/nvidia/pytorch:26.03-py3
    container_name: pytorch-gpu
    runtime: nvidia                  # Enables full GPU support
    environment:
      - NVIDIA_VISIBLE_DEVICES=all   # Use all GPUs (or set to 0 for just the first one)
    volumes:
      - .:/workspace                 # Mounts your current folder to /workspace inside container
      - ./notebooks:/workspace/notebooks
      - ./projects:/workspace/projects
    working_dir: /workspace
    stdin_open: true
    tty: true
    ports:
      - "8888:8888"                  # For Jupyter Notebook (optional but useful)
      - "6006:6006"                  # For TensorBoard (optional)
    command: bash                    # Starts with a shell (you can change later)
